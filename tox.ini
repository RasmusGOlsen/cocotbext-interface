[tox]
requires =
    tox>=4.2
env_list =
    lint
    py313
    py312
    py311
    py310
    py39
    py38

[testenv]
package = wheel
deps =
    pytest
    pytest-cov
commands =
    pytest --junitxml {toxworkdir}/junit.{envname}.xml --cov {envsitepackagesdir}/cocotbext/interface --cov-report term-missing --cov-report xml:{toxworkdir}/coverage.{envname}.xml {posargs:tests}

[testenv:lint]
description = run code formatter and linter (auto-fix)
skip_install = true
deps =
    pre-commit-uv>=4.1.1
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:pkg]
description = build and check package distribution (including PyPI classifiers)
skip_install = true
deps =
    build>=1.2
    twine>=6.1
commands =
    python -m build
    twine check --strict dist/*

[testenv:type]
description = run type check on code base
deps =
    mypy==1.4.1
    types-cachetools>=5.3.0.5
    types-chardet>=5.0.4.6
commands =
    mypy --junit-xml {toxworkdir}/junit.{envname}_src.xml cocotbext/interface
    mypy --junit-xml {toxworkdir}/junit.{envname}_tests.xml tests

[testenv:docs]
deps =
    -r {toxinidir}/docs/requirements.txt
commands =
    sphinx-build -E -b html docs {envdir}/html
skip_sdist = true

[testenv:dev]
description = Development environment with all dependencies
package = editable
deps =
    {[testenv:lint]deps}
    {[testenv:type]deps}
    {[testenv]deps}
extras =
    dev
    test
    type
commands =
    uv pip tree
    python -c 'import sys; print(sys.executable)'
